$kind: http-request
name: Update Inventory
method: PATCH
url: '{{baseUrl}}/inventory/{{inventoryId}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "productId": "{{productId}}",
      "quantity": 20,
      "unit": "kg",
      "preferredMarket": "Dawanau"
    }
