$kind: collection
name: Venato API
description: REST API collection for the Venato market price tracking platform.
  Covers authentication, products, markets, profile management, statistics,
  watchlist, access control, and inventory.
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
variables:
  baseUrl: http://localhost:3000/api
  accessToken: ""
  refreshToken: ""
  productId: ""
  marketId: ""
  userId: ""
  inventoryId: ""
  "": ""
